version: '3.9'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
      - db_data:/app/backend
    environment:
      - SECRET_KEY=${SECRET_KEY:-parivesh-secret-change-me}
      - DB_PATH=/app/backend/parivesh.db
    restart: unless-stopped

volumes:
  uploads_data:
  db_data:
